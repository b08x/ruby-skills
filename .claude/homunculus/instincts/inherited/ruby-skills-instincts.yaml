# Ruby Skills Workflow Add Or Update Skill

## Action

Follow the add-or-update-skill workflow:
1. Create or update SKILL.md in plugins/ruby-skills/skills/<skill-name>/
2. Update plugins/ruby-skills/.claude-plugin/plugin.json to register the skill
3. Update .claude-plugin/marketplace.json to reflect the new or changed skill
4. Update README.md and CLAUDE.md to document the skill and its usage

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: plugins/ruby-skills/skills/*/SKILL.md, plugins/ruby-skills/.claude-plugin/plugin.json, .claude-plugin/marketplace.json

