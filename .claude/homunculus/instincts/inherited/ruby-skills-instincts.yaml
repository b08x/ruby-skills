# Ruby Skills Workflow Remove Plugin

## Action

Follow the remove-plugin workflow:
1. Delete the plugin directory and all its files
2. Remove the plugin entry from .claude-plugin/marketplace.json
3. Update or remove related sections in README.md and CLAUDE.md
4. Update plugins/ruby-skills/.claude-plugin/plugin.json if necessary

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: plugins/<plugin-name>/**, .claude-plugin/marketplace.json, README.md

